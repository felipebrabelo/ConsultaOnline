<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{login.title})}"></head>
<body>
<div th:replace="~{fragments/header :: topnav}"></div>

<main class="container py-4">
    <div class="auth-panel mx-auto">
        <h1 class="h4 mb-3" th:text="#{login.title}"></h1>
        <div th:if="${param.logout}" class="alert alert-success" th:text="#{login.logout}"></div>
        <form th:action="@{/login}" method="post" class="vstack gap-3" novalidate>
            <div>
                <label for="email" class="form-label" th:text="#{field.email}"></label>
                <input id="email" name="email" type="email" class="form-control" th:classappend="${param.error} ? 'is-invalid'" autofocus>
                <div class="invalid-feedback d-block" th:if="${param.error}" th:text="#{login.email.error}"></div>
            </div>
            <div>
                <label for="senha" class="form-label" th:text="#{field.password}"></label>
                <input id="senha" name="senha" type="password" class="form-control" th:classappend="${param.error} ? 'is-invalid'">
                <div class="invalid-feedback d-block" th:if="${param.error}" th:text="#{login.password.error}"></div>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-box-arrow-in-right"></i>
                <span th:text="#{nav.login}"></span>
            </button>
        </form>
    </div>
</main>

<script th:replace="~{fragments/scripts :: scripts}"></script>
</body>
</html>
