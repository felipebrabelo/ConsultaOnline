<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{error.page.title})}"></head>
<body>
<div th:replace="~{fragments/header :: topnav}"></div>

<main class="container py-5">
    <div class="text-center mx-auto" style="max-width: 520px;">
        <div class="display-5 text-danger mb-3">
            <i class="bi bi-exclamation-circle-fill"></i>
        </div>
        <p class="text-muted mb-1" th:text="${status}">500</p>
        <h1 class="h3" th:text="#{${error}}"></h1>
        <p class="text-muted" th:text="#{${message}}"></p>
        <div class="d-flex justify-content-center gap-2">
            <a class="btn btn-outline-secondary" href="javascript:history.back()">
                <i class="bi bi-arrow-left"></i>
                <span th:text="#{previous.message}"></span>
            </a>
            <a class="btn btn-primary" th:href="@{/}">
                <i class="bi bi-house-door"></i>
                <span th:text="#{nav.home}"></span>
            </a>
        </div>
    </div>
</main>

<script th:replace="~{fragments/scripts :: scripts}"></script>
</body>
</html>
