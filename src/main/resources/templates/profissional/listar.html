<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{professional.list.title})}"></head>
<body>
<div th:replace="~{fragments/header :: topnav}"></div>
<div th:replace="~{fragments/actions :: actions}"></div>

<main class="container py-4">
    <div class="page-bar">
        <h1 class="h4 mb-0" th:text="#{professional.list.title}"></h1>
        <a sec:authorize="hasRole('ADMIN')" class="btn btn-primary btn-sm" th:href="@{/profissionais/cadastrar}">
            <i class="bi bi-plus-lg"></i>
            <span th:text="#{action.new}"></span>
        </a>
    </div>
    <div th:replace="~{fragments/alert :: alerts}"></div>
    <form th:action="@{/profissionais/listar}" method="get" class="filter-bar">
        <select class="form-select form-select-sm" name="especialidade">
            <option value="" th:text="#{filter.allSpecialties}"></option>
            <option th:each="especialidade : ${especialidades}" th:value="${especialidade}"
                    th:selected="${especialidade == especialidadeSelecionada}"
                    th:text="${especialidade.descricao}">Especialidade</option>
        </select>
        <button class="btn btn-sm btn-outline-primary" type="submit">
            <i class="bi bi-funnel"></i>
            <span th:text="#{action.filter}"></span>
        </button>
    </form>
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
            <tr>
                <th th:text="#{field.name}"></th>
                <th th:text="#{field.email}"></th>
                <th th:text="#{field.specialty}"></th>
                <th th:text="#{field.resume}"></th>
                <th class="text-end" th:text="#{field.actions}"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="profissional : ${profissionais}">
                <td th:text="${profissional.nome}">Nome</td>
                <td th:text="${profissional.email}">email</td>
                <td th:text="${profissional.especialidade.descricao}">Especialidade</td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:if="${profissional.curriculo != null}"
                       th:href="@{/profissionais/{id}/curriculo(id=${profissional.id})}" target="_blank"
                       rel="noopener" th:title="#{action.viewResume}">
                        <i class="bi bi-file-earmark-pdf"></i>
                        <span th:text="#{action.viewResume}"></span>
                    </a>
                </td>
                <td class="text-end text-nowrap">
                    <a sec:authorize="hasRole('CLIENTE')" class="btn btn-sm btn-success"
                       th:href="@{/consultas/agendar/{id}(id=${profissional.id})}">
                        <i class="bi bi-calendar-plus"></i>
                        <span th:text="#{appointment.schedule}"></span>
                    </a>
                    <a sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-secondary"
                       th:href="@{/profissionais/editar/{id}(id=${profissional.id})}" th:title="#{action.edit}">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-danger"
                       th:href="@{/profissionais/excluir/{id}(id=${profissional.id})}" th:title="#{action.delete}"
                       th:onclick="|return confirm('#{confirm.delete.professional}')|">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(profissionais)}">
                <td colspan="5" class="text-center text-muted py-4" th:text="#{table.empty}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script th:replace="~{fragments/scripts :: scripts}"></script>
</body>
</html>
